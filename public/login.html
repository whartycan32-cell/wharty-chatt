<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#2196f3,#1565c0);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:white;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:350px;
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#eee;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#2196f3;
  color:white;
  font-size:16px;
}

#msg { margin-top:10px; }
</style>
</head>

<body>

<div class="box">
  <h2>Giriş Yap</h2>

  <input id="u" placeholder="Kullanıcı adı">
  <input id="p" type="password" placeholder="Şifre">

  <button onclick="login()">Giriş</button>

  <p id="msg"></p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const s = io();

function login(){
  s.emit("login",{username:u.value,password:p.value});
}

s.on("loginSuccess",(d)=>{
  localStorage.setItem("user",d.username);
  location.href="chat.html";
});

s.on("loginError",(m)=>{
  msg.style.color="red";
  msg.innerText=m;
});
</script>

</body>
</html>
