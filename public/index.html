<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wharty Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>Özel Sohbet Programı</h1>
  <input id="name" placeholder="İsmini yaz">
  <button onclick="enter()">Giriş</button>
</div>

<!-- LOADING -->
<div id="loading" class="hidden">
  <h2>Sohbetleriniz yükleniyor...</h2>
</div>

<!-- CHAT -->
<div id="app" class="hidden">

  <div class="sidebar" id="users"></div>

  <div class="chat">
    <div id="chatBox"></div>

    <div class="inputBox">
      <input id="msg">
      <button onclick="send()">Gönder</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
