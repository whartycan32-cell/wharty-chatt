<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wharty Chat</title>

<style>
body { margin:0; font-family:sans-serif; background:#f0f2f5; }

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
  margin-top:5px;
}

#success { color:green; }
#error { color:red; }

/* LOADING */
#loading {
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.bar {
  width:200px;
  height:6px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.progress {
  height:100%;
  width:0%;
  background:#4caf50;
}

/* CHAT */
#app {
  display:none;
  height:100vh;
}

.container { display:flex; height:100%; }

.sidebar {
  width:30%;
  background:#fff;
  border-right:1px solid #ddd;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

#chatBox {
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  max-width:70%;
  padding:10px;
  border-radius:12px;
}

.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:#eee; }

.inputBox {
  display:flex;
  padding:10px;
}

.inputBox input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

.inputBox button {
  margin-left:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Wharty Sohbet</h2>

  <input id="username" placeholder="Kullanıcı adı">
  <input id="password" type="password" placeholder="Şifre">

  <button onclick="register()">Kayıt Ol</button>
  <button onclick="login()">Giriş Yap</button>

  <p id="success"></p>
  <p id="error"></p>
</div>

<!-- LOADING -->
<div id="loading">
  <h2>Wharty Sohbet Yeri</h2>
  <div class="bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<!-- CHAT -->
<div id="app">
  <div class="container">
    <div class="sidebar" id="friends"></div>

    <div class="chat">
      <div id="chatBox"></div>

      <div class="inputBox">
        <input id="msg">
        <button onclick="send()">Gönder</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let myName = "";

// KAYIT
function register(){
  const username = usernameInput.value;
  const password = passwordInput.value;

  socket.emit("register",{username,password});
}

socket.on("registerSuccess",()=>{
  success.innerText="Başarılı ile kayıt olundu";
  error.innerText="";
});

socket.on("registerError",(msg)=>{
  error.innerText=msg;
});

// LOGIN
function login(){
  const username = usernameInput.value;
  const password = passwordInput.value;

  socket.emit("login",{username,password});
}

socket.on("loginError",(msg)=>{
  error.innerText=msg;
});

socket.on("loginSuccess",(data)=>{
  myName = data.username;

  login.style.display="none";
  loading.style.display="flex";

  startLoading();
});

// LOADING
function startLoading(){
  let w=0;
  let i=setInterval(()=>{
    w++;
    progress.style.width=w+"%";

    if(w>=100){
      clearInterval(i);
      loading.style.display="none";
      app.style.display="flex";
    }
  },30);
}

// CHAT
socket.on("loadMessages",(msgs)=>{
  msgs.forEach(addMessage);
});

socket.on("newMessage",(msg)=>{
  addMessage(msg);
});

function send(){
  const text = msg.value;
  if(!text) return;

  socket.emit("sendMessage",text);
  msg.value="";
}

function addMessage(m){
  const d=document.createElement("div");
  d.classList.add("msg");

  if(m.user===myName) d.classList.add("me");
  else d.classList.add("other");

  d.innerText = m.user + ": " + m.text;

  chatBox.appendChild(d);
}
</script>

</body>
</html>
