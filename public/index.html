<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wharty Chat</title>

<style>
body { margin:0; font-family:sans-serif; background:#f0f2f5; }

#login, #loading {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#loading { display:none; }

.bar { width:200px; height:6px; background:#ddd; border-radius:10px; overflow:hidden; }
.progress { height:100%; width:0%; background:#4caf50; }

#app { display:none; height:100vh; }

.sidebar {
  width:30%;
  background:#fff;
  overflow:auto;
  border-right:1px solid #ddd;
}

.user {
  padding:10px;
  cursor:pointer;
  display:flex;
  align-items:center;
}

.avatar {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#4caf50;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-right:10px;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

#chatBox {
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg { max-width:70%; padding:10px; border-radius:12px; }
.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:#eee; }

.inputBox { display:flex; padding:10px; }
.inputBox input { flex:1; padding:10px; border:none; border-radius:20px; }
.inputBox button { margin-left:10px; }

.container { display:flex; height:100%; }
</style>
</head>

<body>

<div id="login">
  <h2>Wharty Sohbet</h2>
  <input id="username" placeholder="Kullanıcı adı">
  <input id="password" type="password" placeholder="Şifre">
  <button onclick="login()">Giriş</button>
  <p id="error"></p>
</div>

<div id="loading">
  <h2>Wharty Sohbet Yeri</h2>
  <div class="bar"><div class="progress" id="progress"></div></div>
</div>

<div id="app">
  <div class="container">
    <div class="sidebar" id="friends"></div>

    <div class="chat">
      <div id="chatBox"></div>

      <div class="inputBox">
        <input id="msg">
        <button onclick="send()">Gönder</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let myName = "";
let currentChat = "";

// LOGIN
function login(){
  const username = usernameInput.value;
  const password = passwordInput.value;
  socket.emit("login",{username,password});
}

socket.on("loginError",msg=>error.innerText=msg);

socket.on("loginSuccess",(data)=>{
  myName = data.username;

  login.style.display="none";
  loading.style.display="flex";

  startLoading();

  updateFriends(data.friends);
});

// LOADING
function startLoading(){
  let width=0;
  let interval=setInterval(()=>{
    width++;
    progress.style.width=width+"%";
    if(width>=100){
      clearInterval(interval);
      loading.style.display="none";
      app.style.display="flex";
    }
  },30);
}

// FRIENDS
function updateFriends(list){
  friends.innerHTML="";
  list.forEach(u=>{
    const el=document.createElement("div");
    el.className="user";

    el.innerHTML=`
      <div class="avatar">${u[0].toUpperCase()}</div>
      ${u}
    `;

    el.onclick=()=>{
      currentChat=u;
      socket.emit("getDM",u);
    };

    friends.appendChild(el);
  });
}

// DM
socket.on("loadDM",(msgs)=>{
  chatBox.innerHTML="";
  msgs.forEach(addMessage);
});

socket.on("newDM",({key,msg})=>{
  if(currentChat && key.includes(currentChat)){
    addMessage(msg);
  }
});

function send(){
  const text=msg.value;
  if(!text || !currentChat) return;

  socket.emit("sendDM",{to:currentChat,text});
  msg.value="";
}

function addMessage(m){
  const div=document.createElement("div");
  div.classList.add("msg");

  if(m.from===myName) div.classList.add("me");
  else div.classList.add("other");

  div.innerText=m.text;
  chatBox.appendChild(div);
}
</script>

</body>
</html>
