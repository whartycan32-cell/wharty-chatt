<!DOCTYPE html>
<html>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">

<div>
  <h2>Kayıt Ol</h2>

  <input id="u" placeholder="Kullanıcı adı"><br><br>
  <input id="p" type="password" placeholder="Şifre"><br><br>

  <button onclick="register()">Kayıt Ol</button>

  <p id="msg"></p>

  <p>
    Hesabın var mı?
    <span onclick="goLogin()" style="color:green;cursor:pointer;">Giriş yap</span>
  </p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const s = io();

function register(){
  s.emit("register",{username:u.value,password:p.value});
}

s.on("registerSuccess",()=>{
  msg.style.color="green";
  msg.innerText="Kayıt başarılı ✔";

  setTimeout(()=>location.href="login.html",1000);
});

s.on("registerError",(m)=>{
  msg.style.color="red";
  msg.innerText=m;
});

function goLogin(){
  location.href="login.html";
}
</script>

</body>
</html>
