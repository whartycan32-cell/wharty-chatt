<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wharty Kayıt</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1a6b52, #07110d 65%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
}

.card {
  width: 100%;
  max-width: 390px;
  background: rgba(255,255,255,0.96);
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.35);
  text-align: center;
}

.logo {
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: #0f5f46;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 28px;
  font-weight: 800;
}

h1 {
  margin: 0;
  color: #0d2f25;
  font-size: 26px;
}

p {
  color: #6b7280;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  border: none;
  outline: none;
  border-radius: 16px;
  background: #eef2f3;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 16px;
  border: none;
  border-radius: 16px;
  background: #0f5f46;
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

.switch {
  margin-top: 18px;
  font-size: 14px;
  color: #6b7280;
}

.switch span {
  color: #0f5f46;
  font-weight: 800;
  cursor: pointer;
}

#msg {
  min-height: 20px;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">W</div>
  <h1>Kayıt Ol</h1>
  <p>Wharty sohbet hesabını oluştur.</p>

  <input id="username" placeholder="Kullanıcı adı">
  <input id="password" type="password" placeholder="Şifre">

  <button onclick="register()">Kayıt Ol</button>

  <div id="msg"></div>

  <div class="switch">
    Hesabın var mı?
    <span onclick="location.href='login.html'">Giriş yap</span>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function register() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  socket.emit("register", { username, password });
}

socket.on("registerSuccess", () => {
  const msg = document.getElementById("msg");
  msg.style.color = "green";
  msg.innerText = "Kayıt başarılı ✔ Giriş sayfasına yönlendiriliyorsun...";
  setTimeout(() => location.href = "login.html", 1200);
});

socket.on("registerError", (m) => {
  const msg = document.getElementById("msg");
  msg.style.color = "red";
  msg.innerText = m;
});
</script>

</body>
</html>
