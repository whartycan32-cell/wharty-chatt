<!DOCTYPE html>
<html lang="tr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wharty Kayıt</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f0f2f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:white;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#eee;
}

button {
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
  cursor:pointer;
}

#msg {
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Kayıt Ol</h2>

  <input id="username" placeholder="Kullanıcı adı">
  <input id="password" type="password" placeholder="Şifre">

  <button onclick="register()">Kayıt Ol</button>

  <p id="msg"></p>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

function register(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!username || !password){
    msg.innerText = "Boş bırakma";
    msg.style.color = "red";
    return;
  }

  socket.emit("register", { username, password });
}

socket.on("registerSuccess", ()=>{
  msg.innerText = "Kayıt başarılı ✔";
  msg.style.color = "green";

  setTimeout(()=>{
    window.location.href = "login.html";
  },1000);
});

socket.on("registerError",(m)=>{
  msg.innerText = m;
  msg.style.color = "red";
});
</script>

</body>
</html>
