<!DOCTYPE html>
<html>
<body style="margin:0;font-family:sans-serif;">

<div id="loading" style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;">
  <h2>Wharty Sohbet</h2>
  <div style="width:200px;height:6px;background:#ddd;">
    <div id="bar" style="height:100%;width:0;background:green;"></div>
  </div>
</div>

<div id="app" style="display:none;height:100vh;flex-direction:column;">
  <div id="chat" style="flex:1;overflow:auto;padding:10px;"></div>

  <div style="display:flex;padding:10px;">
    <input id="msg" style="flex:1;">
    <button onclick="send()">Gönder</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const s = io();
const user = localStorage.getItem("user");

if(!user) location.href="login.html";

// DOĞRU LOGIN (FIX)
s.emit("login",{username:user,password:usersPass});

// LOADING
let w=0;
let i=setInterval(()=>{
  w++;
  bar.style.width=w+"%";

  if(w>=100){
    clearInterval(i);
    loading.style.display="none";
    app.style.display="flex";
  }
},30);

// MESAJ
s.on("loadMessages",(msgs)=>{
  msgs.forEach(add);
});

s.on("newMessage",(m)=>add(m));

function send(){
  s.emit("sendMessage",msg.value);
  msg.value="";
}

function add(m){
  const d=document.createElement("div");
  d.innerText=m.user+": "+m.text;
  chat.appendChild(d);
}
</script>

</body>
</html>
