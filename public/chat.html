<!DOCTYPE html>
<html>
<head>
<style>
body {margin:0;font-family:sans-serif;}

#loading {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.bar {
  width:200px;
  height:6px;
  background:#ddd;
}

.progress {
  height:100%;
  width:0%;
  background:#4caf50;
}

#app {
  display:none;
  height:100vh;
  flex-direction:column;
}

#chat {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg { margin:5px 0; }

.inputBox {
  display:flex;
  padding:10px;
}
.inputBox input { flex:1; }
</style>
</head>

<body>

<div id="loading">
  <h2>Wharty Sohbet</h2>
  <div class="bar">
    <div class="progress" id="bar"></div>
  </div>
</div>

<div id="app">
  <div id="chat"></div>

  <div class="inputBox">
    <input id="msg">
    <button onclick="send()">Gönder</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const s = io();
const user = localStorage.getItem("user");

if(!user) location.href="login.html";

// ⚠️ BURASI FIX
s.on("connect",()=>{
  // sadece giriş yaptığını söyle (şifre tekrar istemiyoruz)
  s.username = user;
});

// LOADING
let w=0;
let i=setInterval(()=>{
  w++;
  bar.style.width=w+"%";

  if(w>=100){
    clearInterval(i);
    loading.style.display="none";
    app.style.display="flex";
  }
},30);

// MESAJ
s.on("loadMessages",(msgs)=>{
  msgs.forEach(add);
});

s.on("newMessage",(m)=>add(m));

function send(){
  if(!msg.value) return;

  s.emit("sendMessage",msg.value);
  msg.value="";
}

function add(m){
  const d=document.createElement("div");
  d.className="msg";
  d.innerText=m.user+": "+m.text;
  chat.appendChild(d);
}
</script>

</body>
</html>
