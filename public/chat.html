<!DOCTYPE html>
<html lang="tr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin:0;
  background:#0b1724;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* LOADING */
#loading {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#0b1724;
  color:white;
}

.bar {
  width:200px;
  height:6px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

#bar {
  height:100%;
  width:0%;
  background:#2196f3;
}

/* CHAT */
#app {
  display:none;
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header {
  background:#0d3b2e;
  color:white;
  padding:15px;
  font-weight:bold;
  text-align:center;
}

/* CHAT AREA */
#chatBox {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#2196f3;
}

/* MESAJ */
.msg {
  max-width:75%;
  padding:10px;
  border-radius:12px;
  background:black;
  color:white;
  word-break:break-word;
}

.me {
  align-self:flex-end;
}

.other {
  align-self:flex-start;
}

/* INPUT */
.inputBox {
  display:flex;
  padding:10px;
  background:white;
  gap:8px;
}

.inputBox input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#eee;
  font-size:16px;
}

.inputBox button {
  padding:12px 16px;
  border:none;
  border-radius:15px;
  background:#0d3b2e;
  color:white;
}

/* MOBİL FIX */
@media (max-width:600px){
  .inputBox input{
    font-size:16px; /* zoom bug fix */
  }
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <h2>Wharty Chat</h2>
  <div class="bar">
    <div id="bar"></div>
  </div>
</div>

<!-- CHAT -->
<div id="app">
  <div class="header">Global Sohbet</div>

  <div id="chatBox"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Mesaj yaz...">
    <button onclick="send()">Gönder</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const s = io();

const user = localStorage.getItem("whartyUser");
const pass = localStorage.getItem("whartyPass");

if(!user || !pass){
  location.href="login.html";
}

// GİRİŞ
s.emit("login",{username:user,password:pass});

// LOADING
s.on("loginSuccess",()=>{
  startLoading();
});

function startLoading(){
  let w=0;
  let i=setInterval(()=>{
    w++;
    bar.style.width=w+"%";

    if(w>=100){
      clearInterval(i);
      loading.style.display="none";
      app.style.display="flex";
    }
  },20);
}

// MESAJLAR
s.on("loadMessages",(msgs)=>{
  chatBox.innerHTML="";
  msgs.forEach(add);
});

s.on("newMessage",(m)=>{
  add(m);
});

// GÖNDER
function send(){
  const text = msg.value.trim();
  if(!text) return;

  s.emit("sendMessage",text);
  msg.value="";
}

// ENTER İLE GÖNDER (MOBİL FIX)
msg.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

// MESAJ EKLE
function add(m){
  const d=document.createElement("div");
  d.classList.add("msg");

  if(m.user===user){
    d.classList.add("me");
  } else {
    d.classList.add("other");
  }

  d.innerText = m.user + ": " + m.text;

  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
